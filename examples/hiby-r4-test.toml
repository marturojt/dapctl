schema_version = 1

[profile]
name         = "hiby-r4-flac"
source       = "D:\\SpecialTorrentFolder\\Downloads"
destination  = "F:\\Music"   # or an explicit path like "/Volumes/FIIO M21/Music"
dap_profile  = "generic"
mode         = "additive"          # additive | mirror | selective

[filters]
include_globs = ["**/*.flac", "**/*.dsf", "**/*.mp3"]
exclude_globs = ["**/demo/**", "**/_wip/**"]

[transfer]
verify          = "size_mtime"   # none | size_mtime | checksum
dry_run_default = true           # enforced when mode = "mirror"
parallelism     = 4

[transcode]
enabled = false
# rules = [{ from = "DSF", to = "FLAC", params = "-ar 176400 -sample_fmt s32" }]
