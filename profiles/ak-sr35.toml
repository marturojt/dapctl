schema_version = 1

[dap]
id           = "ak-sr35"
name         = "Astell&Kern SR35"
vendor       = "Astell&Kern"
firmware_min = "1.00"
sources      = [
  "https://www.astellnkern.com/products/sr35",
  "https://www.head-fi.org/threads/astell-kern-sr35.968827/",
]

[filesystem]
preferred          = "exFAT"
supported          = ["FAT32", "exFAT"]
max_filename_bytes = 255
max_path_bytes     = 4096
case_sensitive     = false

[codecs]
lossless           = ["FLAC", "ALAC", "WAV", "APE", "DSF", "DFF", "WMA"]
lossy              = ["MP3", "AAC", "OGG", "OPUS", "WMA"]
max_sample_rate_hz = 768000
max_bit_depth      = 32
dsd                = ["DSD64", "DSD128", "DSD256"]

[layout]
music_root                = "/"
prefers_artist_album_tree = true

[exclude]
globs = [
  ".thumbnails/**",
  ".nomedia",
  "*.db-journal",
  "System Volume Information/**",
  "$RECYCLE.BIN/**",
  ".Trash-*/**",
  ".DS_Store",
  "._*",
  "LOST.DIR/**",
  "**/*.dapctl-tmp",
]

[quirks]
warn_on_embedded_art_mb = 5
normalize_unicode       = "NFC"
